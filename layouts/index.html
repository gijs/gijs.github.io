{{ define "main" }}
<main class="max-w-5xl mx-auto px-6 py-16">

  {{/* Bio */}}
  {{ with .Content }}
  <div class="max-w-2xl mb-16 prose" style="font-family: 'Lora', Georgia, serif;">
    {{ . }}
  </div>
  {{ end }}

  {{/* Article cards */}}
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="group flex flex-col border border-gray-200 p-6 hover:border-gray-400 transition-colors duration-150" style="background: #fff8f6;">
      <div class="mb-3">
        <p class="text-xs text-gray-400 mb-2" style="font-family: 'Inter', sans-serif;">
          Words by <strong class="text-gray-600">Gijs Nijholt</strong>
        </p>
        <h2 style="font-family: 'Playfair Display', Georgia, serif; font-size: 1.2rem; font-weight: 700; line-height: 1.3; color: #111;">{{ .Title }}</h2>
      </div>
      <p class="text-sm text-gray-500 leading-relaxed flex-1 mb-6" style="font-family: 'Inter', sans-serif;">{{ .Summary }}</p>
      <div class="flex items-center justify-between mt-auto">
        <span class="text-xs text-gray-400 border border-gray-200 px-2 py-0.5" style="font-family: 'Inter', sans-serif;">{{ .Date.Format "Jan 2006" }}</span>
        <span class="text-sm text-gray-400 group-hover:text-gray-800 transition-colors" style="font-family: 'Inter', sans-serif;">Read more &rarr;</span>
      </div>
    </a>
    {{ end }}
  </div>

</main>
{{ end }}
